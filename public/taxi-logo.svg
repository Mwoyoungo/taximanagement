<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" fill="none">
  <!-- Shadow -->
  <ellipse cx="60" cy="75" rx="55" ry="4" fill="#000" opacity="0.2"/>

  <!-- Taxi Sign on Roof -->
  <rect x="45" y="8" width="30" height="8" rx="2" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="47" y="10" width="26" height="4" rx="1" fill="#ffc93e"/>
  <text x="60" y="13" text-anchor="middle" font-size="3" fill="#333" font-family="Arial" font-weight="bold">TAXI</text>

  <!-- Car Roof/Windshield Top -->
  <path d="M30 25 Q35 15 60 15 Q85 15 90 25 L95 30 L25 30 Z" fill="#ffc93e"/>

  <!-- Windshield -->
  <path d="M35 30 L40 20 Q60 18 80 20 L85 30 Z" fill="#2a3a4a" opacity="0.9"/>
  <path d="M35 30 L40 20 Q60 18 80 20 L85 30 Z" fill="url(#windshield)" opacity="0.3"/>

  <!-- Hood -->
  <path d="M15 35 Q25 30 60 30 Q95 30 105 35 L108 42 Q110 48 105 52 L15 52 Q10 48 12 42 Z" fill="#ffc93e"/>

  <!-- Headlights - Left -->
  <path d="M15 38 Q20 36 28 38 L28 46 Q20 48 15 46 Z" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
  <ellipse cx="22" cy="42" rx="5" ry="3" fill="#fff" opacity="0.8"/>

  <!-- Headlights - Right -->
  <path d="M105 38 Q113 36 118 38 L118 46 Q113 48 105 46 Z" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
  <ellipse cx="112" cy="42" rx="5" ry="3" fill="#fff" opacity="0.8"/>

  <!-- Grill -->
  <rect x="50" y="42" width="20" height="8" rx="2" fill="#333"/>
  <line x1="55" y1="44" x2="65" y2="44" stroke="#555" stroke-width="0.5"/>
  <line x1="55" y1="46" x2="65" y2="46" stroke="#555" stroke-width="0.5"/>
  <line x1="55" y1="48" x2="65" y2="48" stroke="#555" stroke-width="0.5"/>

  <!-- Side Mirrors -->
  <ellipse cx="12" cy="32" rx="6" ry="3" fill="#ffc93e" stroke="#e6b02e" stroke-width="0.5"/>
  <ellipse cx="12" cy="32" rx="4" ry="2" fill="#2a3a4a"/>
  <ellipse cx="108" cy="32" rx="6" ry="3" fill="#ffc93e" stroke="#e6b02e" stroke-width="0.5"/>
  <ellipse cx="108" cy="32" rx="4" ry="2" fill="#2a3a4a"/>

  <!-- Front Bumper -->
  <path d="M10 50 Q60 55 110 50 L112 58 Q110 62 105 62 L15 62 Q10 62 8 58 Z" fill="#ffc93e"/>
  <path d="M15 58 L105 58" stroke="#e6b02e" stroke-width="1"/>

  <!-- License Plate -->
  <rect x="45" y="54" width="30" height="6" rx="1" fill="#fff" stroke="#333" stroke-width="0.5"/>
  <text x="60" y="59" text-anchor="middle" font-size="3" fill="#333" font-family="Arial" font-weight="bold">TAXI-001</text>

  <!-- Wheels -->
  <circle cx="25" cy="65" r="10" fill="#333"/>
  <circle cx="25" cy="65" r="5" fill="#555"/>
  <circle cx="25" cy="65" r="2" fill="#888"/>

  <circle cx="95" cy="65" r="10" fill="#333"/>
  <circle cx="95" cy="65" r="5" fill="#555"/>
  <circle cx="95" cy="65" r="2" fill="#888"/>

  <!-- Turn Signals -->
  <circle cx="32" cy="48" r="2" fill="#ffa500"/>
  <circle cx="88" cy="48" r="2" fill="#ffa500"/>

  <!-- Definition for windshield gradient -->
  <defs>
    <linearGradient id="windshield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2a3a4a" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
